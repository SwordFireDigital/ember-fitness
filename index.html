<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#E8622A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ember Fitness">
<title>Ember Fitness</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F0F0F;--surface:#1A1A1A;--card:#242424;--border:#2E2E2E;
  --accent:#E8622A;--text:#FFF;--text2:#AAA;--text3:#555;
  --green:#4CAF50;--blue:#5BAAEE;--r:12px;--rsm:8px;--nav:64px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:var(--nav)}
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.04em;font-family:inherit;padding:0}
.nb svg{width:20px;height:20px}
.nb.on{color:var(--accent)}
.card{background:var(--card);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--rsm);font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s,transform .1s;text-decoration:none;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96);opacity:.85}
.btn-p{background:var(--accent);color:#fff;width:100%}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}
.page-h{font-size:22px;font-weight:800;margin-bottom:4px}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin:18px 0 8px}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-s{background:#3A1808;color:#E8622A}
.b-c{background:#08203A;color:#5BAAEE}
.b-y{background:#0A2818;color:#4CAF50}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:var(--surface);border-radius:var(--rsm);padding:12px 8px;text-align:center}
.stat-n{font-size:24px;font-weight:800;color:var(--accent)}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px;letter-spacing:.03em}
.pb{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.sch-row{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
.sch-row:last-child{border:none}
.sch-d{font-size:14px;font-weight:700;width:38px;flex-shrink:0}
.sch-t{flex:1;font-size:13px;color:var(--text2);padding:0 10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.cal-hdr{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:2px 0}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;color:var(--text3)}
.cal-d.cur{color:var(--text2)}
.cal-d.today{border:1.5px solid var(--accent);color:var(--text)}
.cal-d.done{background:var(--accent);color:#fff}
#guided{display:none;position:fixed;inset:0;background:var(--bg);z-index:20;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px}
#guided.on{display:block}
.g-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px}
.g-prog-txt{font-size:13px;color:var(--text2)}
.g-body{padding:0 16px}
.g-footer{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:10px;z-index:21}
.ex-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.ex-name{font-size:28px;font-weight:800;line-height:1.2;margin-bottom:8px}
.ex-qty{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:10px}
.ex-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.t-disp{font-size:68px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;text-align:center;line-height:1;margin:20px 0 6px}
.t-lbl{font-size:12px;color:var(--text3);text-align:center;margin-bottom:16px}
.t-btns{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.rest-n{font-size:88px;font-weight:800;color:var(--blue);text-align:center;margin:40px 0 6px;font-variant-numeric:tabular-nums;line-height:1}
.rest-lbl{text-align:center;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
</style>
</head>
<body>
<div id="app">
  <div id="main"></div>
  <nav id="nav">
    <button class="nb on" id="nb-home" onclick="go('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="nb" id="nb-schedule" onclick="go('schedule')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Schedule
    </button>
    <button class="nb" id="nb-history" onclick="go('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </button>
  </nav>
</div>
<div id="guided">
  <div class="g-hdr">
    <button class="btn btn-g" style="padding:8px 14px;font-size:13px" onclick="exitGuided()">Exit</button>
    <span class="g-prog-txt" id="g-prog-txt"></span>
    <div style="width:60px"></div>
  </div>
  <div class="pb" style="margin:0 16px 14px"><div class="pf" id="g-pf" style="width:0%"></div></div>
  <div class="g-body" id="g-body"></div>
  <div class="g-footer" id="g-footer"></div>
</div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_S=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_TYPE={0:'yoga-sun',1:'strength',2:'conditioning',3:'strength',4:'conditioning',5:'strength',6:'yoga-sat'};
const TYPE_NAME={'strength':'Strength + Tone','conditioning':'Core + Conditioning','yoga-sat':'Yoga — Spinal Health','yoga-sun':'Yoga — Recovery'};

const WU=[
  {n:'March in place',d:'Lift knees alternately, arms swinging naturally at your sides.',q:'1 min',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=marching+in+place+warm+up+exercise'},
  {n:'Arm circles',d:'Extend arms to sides. Circle forward 30 sec, then backward 30 sec.',q:'30 sec each direction',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=arm+circles+warm+up+exercise+form'},
  {n:'Hip hinge',d:'Stand tall, push hips back while hinging forward at the waist. Keep back flat. No weight.',q:'10 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=hip+hinge+exercise+proper+form+tutorial'},
  {n:'Cat-Cow',d:"On all fours, arch back up (cat) then let it drop toward the floor (cow). Slow and coordinated with breath.",q:'5 cycles',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=cat+cow+stretch+yoga+spine+mobility'},
];
const CD=[
  {n:'Knees-to-chest stretch',d:'Lie on back, pull both knees gently to chest. Hold and breathe into your lower back.',q:'30 sec',tt:'timed',dur:30,yt:'https://www.youtube.com/results?search_query=knees+to+chest+stretch+lower+back'},
  {n:"Child's Pose",d:"Kneel and reach arms forward on the floor, forehead down. Breathe deeply into your lower back and hips.",q:'45 sec',tt:'timed',dur:45,yt:'https://www.youtube.com/results?search_query=childs+pose+yoga+stretch+how+to'},
  {n:'Supine Twist',d:'Lie on back, drop both knees to one side, arms extended at shoulder height. Full spinal decompression.',q:'30 sec per side',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=supine+spinal+twist+stretch+lower+back'},
  {n:'Deep breathing',d:'Inhale for 4 counts, hold 2, exhale for 6. Repeat slowly to fully reset your nervous system.',q:'5 slow breaths',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=deep+breathing+exercise+relaxation+technique'},
];
const STR=[
  {n:'Goblet Squat',d:'Hold one dumbbell at chest. Feet shoulder-width. Squat to comfortable depth, chest tall throughout.',q:'15 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=goblet+squat+dumbbell+proper+form+tutorial'},
  {n:'Romanian Deadlift',d:'Hinge at hips with a flat back. Dumbbells track straight down thighs. Drive through heels to return.',q:'12 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=dumbbell+romanian+deadlift+proper+form'},
  {n:'Bent-Over Row',d:'Slight knee bend, hinge forward at hips. Pull elbows straight back to ribs. Back stays flat.',q:'12 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=dumbbell+bent+over+row+form+tutorial'},
  {n:'Lateral Raise',d:'Raise dumbbells out to shoulder height. Lower on a slow 3-count — the lowering phase is where the work happens.',q:'12 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=lateral+raise+dumbbell+proper+form+tutorial'},
  {n:'Bicep Curl',d:'Full range of motion, controlled tempo. Both arms together. Squeeze at the top of each rep.',q:'15 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=dumbbell+bicep+curl+proper+form+tutorial'},
  {n:'Seated Overhead Press',d:'Sit on edge of a chair. Press from shoulder height to overhead. Core engaged, no arching the lower back.',q:'12 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=seated+dumbbell+overhead+press+form+tutorial'},
];
const CON=[
  {n:'Bird Dog',d:'On all fours, extend opposite arm and leg simultaneously. Hold 1 sec, return. Spine stays completely neutral.',q:'10 reps per side',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=bird+dog+exercise+core+form+tutorial'},
  {n:'Dead Bug',d:'Back flat, arms straight up, knees at 90 degrees. Lower opposite arm and leg slowly — back must not leave the floor.',q:'10 reps per side',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=dead+bug+exercise+core+lower+back+form'},
  {n:'Modified Side Plank',d:'Knees bent, prop up on forearm, lift hips off floor. Hold. Lateral core without spine compression.',q:'30 sec per side',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=modified+side+plank+exercise+form'},
  {n:'Bodyweight Squat',d:'Steady pace to keep heart rate elevated. Chest tall, squat to comfortable depth. Focus on breathing.',q:'20 reps',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=bodyweight+squat+proper+form+tutorial'},
  {n:'High Knee March',d:'Drive knees up alternately, arms pumping. Back-safe cardio burst.',q:'45 sec',tt:'timed',dur:45,yt:'https://www.youtube.com/results?search_query=high+knee+march+cardio+exercise+form'},
  {n:'Dumbbell Punches',d:'Stand tall, alternate forward punches. Steady rhythm. Sustains heart rate for calorie burn.',q:'30 sec per arm',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=dumbbell+punches+standing+cardio+exercise'},
];
const YS=[
  {n:'Cat-Cow flow',d:'Start with 2 min of seated breathing. Then flow through cat-cow slowly, coordinating with breath.',q:'10 cycles',tt:'reps',dur:null,yt:'https://www.youtube.com/results?search_query=cat+cow+yoga+flow+breathing+tutorial'},
  {n:"Child's Pose",d:"Kneel, sit back on heels, reach arms forward. Breathe into lower back and hips.",q:'1 min',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=childs+pose+yoga+how+to+tutorial'},
  {n:'Thread the Needle',d:'From all fours, slide one arm under your body, rotating the upper spine. Stretch through the upper back.',q:'30 sec per side',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=thread+the+needle+yoga+stretch+tutorial'},
  {n:'Low Lunge stretch',d:'Step one foot forward into a lunge, lower back knee to the floor. Press hips forward gently.',q:'1 min per side',tt:'timed',dur:120,yt:'https://www.youtube.com/results?search_query=low+lunge+yoga+hip+flexor+stretch+tutorial'},
  {n:'Bridge Pose',d:'Lie on back, feet flat and hip-width. Lift hips until body forms a straight line. Hold and breathe.',q:'2 rounds x 30 sec',tt:'timed',dur:60,yt:'https://www.youtube.com/results?search_query=bridge+pose+yoga+how+to+tutorial'},
  {n:'Supine Twist',d:'Lie on back, drop bent knees to one side, arms extended at shoulder height. Full spinal decompression.',q:'1 min per side',tt:'timed',dur:120,yt:'https://www.youtube.com/results?search_query=supine+spinal+twist+yoga+pose+tutorial'},
  {n:'Savasana',d:'Lie flat, arms slightly out, palms up. Complete stillness. Let the body fully absorb the session.',q:'2-3 min',tt:'timed',dur:150,yt:'https://www.youtube.com/results?search_query=savasana+corpse+pose+yoga+relaxation'},
];
const YN=[
  {n:'Legs Up the Wall',d:'Lie close to a wall, extend legs straight up against it. Arms relaxed at sides. Fully passive recovery.',q:'3-5 min',tt:'timed',dur:240,yt:'https://www.youtube.com/results?search_query=legs+up+the+wall+yoga+pose+tutorial'},
  {n:'Supine Pigeon Pose',d:'Lie on back, cross one ankle over opposite knee. Gently pull both legs toward chest.',q:'1 min per side',tt:'timed',dur:120,yt:'https://www.youtube.com/results?search_query=supine+pigeon+pose+yoga+tutorial'},
  {n:'Supported Bridge',d:'Lie on back with a folded towel or firm pillow under your sacrum. Arms relaxed. Passive hip opener.',q:'2 min',tt:'timed',dur:120,yt:'https://www.youtube.com/results?search_query=supported+bridge+pose+restorative+yoga'},
  {n:"Child's Pose + deep breathing",d:"Hold longer than Saturday. Breathe into lower back on each inhale. Focus on complete release.",q:'2 min',tt:'timed',dur:120,yt:'https://www.youtube.com/results?search_query=childs+pose+deep+breathing+restorative+yoga'},
];

function buildSteps(type){
  const steps=[];
  function ex(e,sec){steps.push({stype:'exercise',sec,...e});}
  function rest(dur,lbl){steps.push({stype:'rest',dur,lbl:lbl||'Rest'});}
  if(type==='yoga-sat'||type==='yoga-sun'){
    const exs=type==='yoga-sat'?YS:YN;
    exs.forEach((e,i)=>{ex(e,TYPE_NAME[type]);if(i<exs.length-1)rest(8,'Transition');});
  } else {
    const cir=type==='strength'?STR:CON;
    WU.forEach((e,i)=>{ex(e,'Warm-Up');if(i<WU.length-1)rest(15);});
    for(let r=0;r<2;r++){
      steps.push({stype:'round',round:r+1});
      cir.forEach((e,i)=>{ex(e,`Circuit \u2014 Round ${r+1}`);if(i<cir.length-1)rest(15);});
      if(r===0)rest(60,'Round rest \u2014 catch your breath');
    }
    CD.forEach((e,i)=>{ex(e,'Cool-Down');if(i<CD.length-1)rest(15);});
  }
  steps.push({stype:'complete'});
  return steps;
}

function getHist(){try{return JSON.parse(localStorage.getItem('ef_hist')||'[]');}catch{return[];}}
function saveHist(h){localStorage.setItem('ef_hist',JSON.stringify(h));}
function getRampStart(){return localStorage.getItem('ef_ramp_start');}
function saveRampStart(d){localStorage.setItem('ef_ramp_start',d);}
function dStr(d){d=d||new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function getStreak(){
  const hist=new Set(getHist());let streak=0,d=new Date();
  if(!hist.has(dStr(d)))d.setDate(d.getDate()-1);
  while(hist.has(dStr(d))){streak++;d.setDate(d.getDate()-1);}
  return streak;
}
function getRampWeek(){
  const s=getRampStart();if(!s)return 1;
  return Math.min(Math.floor((new Date()-new Date(s))/(7*24*60*60*1000))+1,99);
}
function isScheduledDay(dow,wk){
  if(dow===0||dow===6)return true;
  if(wk<=2)return dow===1||dow===3||dow===5;
  if(wk<=4)return dow===1||dow===2||dow===3||dow===5;
  return true;
}
function nextWorkoutDay(dow,wk){
  const scheduled=[0,1,2,3,4,5,6].filter(d=>isScheduledDay(d,wk));
  for(let i=1;i<=7;i++){const d=(dow+i)%7;if(scheduled.includes(d))return DAYS[d];}
  return 'Monday';
}
function markDone(){
  const t=dStr(),h=getHist();
  if(!h.includes(t))h.push(t);
  saveHist(h);if(!getRampStart())saveRampStart(t);
}
function wdDate(dow){
  const d=new Date(),diff=dow-d.getDay(),t=new Date(d);
  t.setDate(d.getDate()+diff);return dStr(t);
}
function tbadge(type){
  const m={strength:'b-s',conditioning:'b-c','yoga-sat':'b-y','yoga-sun':'b-y'};
  return `<span class="badge ${m[type]||'b-s'}">${TYPE_NAME[type]}</span>`;
}

let curView='home';
function go(v){
  curView=v;
  ['home','schedule','history'].forEach(id=>document.getElementById('nb-'+id).classList.toggle('on',id===v));
  const m=document.getElementById('main');
  if(v==='home')m.innerHTML=homeV();
  else if(v==='schedule')m.innerHTML=schedV();
  else m.innerHTML=histV();
}

function homeV(){
  const dow=new Date().getDay(),type=DOW_TYPE[dow],hist=getHist();
  const done=hist.includes(dStr()),streak=getStreak(),wk=getRampWeek();
  const scheduled=isScheduledDay(dow,wk);
  const rampPct=wk<=2?Math.round((wk/2)*100):wk<=4?Math.round(((wk-2)/2)*100):100;
  const rampLbl=wk<=2?'Weeks 1-2 \u2014 Mon, Wed, Fri':wk<=4?'Weeks 3-4 \u2014 Mon, Tue, Wed, Fri':'Week 5+ \u2014 Full Mon-Fri';
  const rows=[1,2,3,4,5,6,0].map(d=>{
    const isT=d===dow,isDone=hist.includes(wdDate(d)),isSched=isScheduledDay(d,wk);
    return `<div class="sch-row">
      <span class="sch-d" style="${isT?'color:var(--accent)':!isSched?'color:var(--text3)':''}">${DAYS_S[d]}</span>
      <span class="sch-t" style="${!isSched?'color:var(--text3)':''}">${isSched?TYPE_NAME[DOW_TYPE[d]]:'Rest day'}</span>
      ${isDone?`<span style="color:var(--green);font-size:16px;font-weight:700">\u2713</span>`:isT&&isSched?`<span style="color:var(--accent);font-size:10px;font-weight:700">TODAY</span>`:isT?`<span style="color:var(--text3);font-size:10px;font-weight:700">REST</span>`:'<span></span>'}
    </div>`;
  }).join('');

  let mainCard='';
  if(done){
    mainCard=`<div class="card" style="background:#0A2818;border:1px solid #1A5030;text-align:center;padding:22px">
      <div style="font-size:40px;margin-bottom:8px">&#128293;</div>
      <p style="font-weight:700;font-size:16px;color:var(--green);margin-bottom:4px">Workout complete!</p>
      <p style="font-size:13px;color:var(--text2)">Great work today. Rest up and come back tomorrow.</p>
      <button class="btn btn-g" style="margin-top:14px;width:100%;font-size:14px" onclick="startGuided('${type}')">Go again</button>
    </div>`;
  } else if(!scheduled){
    const next=nextWorkoutDay(dow,wk);
    const isWeekend=dow===0||dow===6;
    mainCard=`<div class="card" style="text-align:center;padding:28px 20px">
      <div style="font-size:38px;margin-bottom:12px">${isWeekend?'&#129496;':'&#128564;'}</div>
      <p style="font-weight:700;font-size:16px;margin-bottom:6px">Rest day</p>
      <p style="font-size:13px;color:var(--text2);line-height:1.6">${isWeekend?`${DOW_TYPE[dow]==='yoga-sat'?'Yoga \u2014 Spinal Health flow today.':'Yoga \u2014 Recovery + Alignment today.'}<br>Check the Schedule tab for the sequence.`:`Your ramp-up plan doesn't include today. Next workout: <strong style="color:var(--text)">${next}</strong>.`}</p>
      ${isWeekend?`<button class="btn btn-p" style="margin-top:18px" onclick="startGuided('${type}')">Start yoga session</button>`:''}
    </div>`;
  } else {
    mainCard=`<div class="card" style="margin-bottom:10px">
      <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px">${TYPE_NAME[type]}</p>
      ${type==='strength'||type==='conditioning'
        ?`<div style="display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:14px">
            <span style="font-size:13px;color:var(--text2)">3 min warm-up</span>
            <span style="font-size:13px;color:var(--text3)">&#183;</span>
            <span style="font-size:13px;color:var(--text2)">13 min circuit &#183; 2 rounds</span>
            <span style="font-size:13px;color:var(--text3)">&#183;</span>
            <span style="font-size:13px;color:var(--text2)">4 min cool-down</span>
          </div>`
        :`<p style="font-size:13px;color:var(--text2);margin-bottom:14px">20 min session &#183; Hold poses fully</p>`}
      <button class="btn btn-p" onclick="startGuided('${type}')">Start today's workout</button>
    </div>`;
  }

  return `<div style="padding:20px 16px 0">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px">
      <div><p style="font-size:13px;color:var(--text2);margin-bottom:2px">${DAYS[dow]}</p><h1 class="page-h">Ember Fitness</h1></div>
      ${scheduled?tbadge(type):`<span class="badge" style="background:#1E1E1E;color:var(--text3)">Rest day</span>`}
    </div>
    <div class="stat-row">
      <div class="stat"><div class="stat-n">${streak}</div><div class="stat-l">Day streak</div></div>
      <div class="stat"><div class="stat-n">${hist.length}</div><div class="stat-l">Total done</div></div>
      <div class="stat"><div class="stat-n" style="font-size:18px">Wk${wk}</div><div class="stat-l">${wk>=5?'Full plan':'Ramp-up'}</div></div>
    </div>
    ${mainCard}
    <p class="sec-lbl">Ramp-up progress</p>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:13px;font-weight:600;color:var(--text)">${rampLbl}</span>
      </div>
      <div class="pb"><div class="pf" style="width:${rampPct}%"></div></div>
    </div>
    <p class="sec-lbl">This week</p>
    <div class="card" style="padding:0 1.25rem">${rows}</div>
  </div>`;
}

function schedV(){
  const dow=new Date().getDay(),wk=getRampWeek();
  const phases=[
    {l:'Weeks 1-2',s:'Mon \u00b7 Wed \u00b7 Fri',a:wk<=2,done:wk>2},
    {l:'Weeks 3-4',s:'Mon \u00b7 Tue \u00b7 Wed \u00b7 Fri',a:wk>=3&&wk<=4,done:wk>4},
    {l:'Week 5+',s:'Mon \u00b7 Tue \u00b7 Wed \u00b7 Thu \u00b7 Fri',a:wk>=5,done:false},
  ];
  return `<div style="padding:20px 16px 0">
    <h1 class="page-h" style="margin-bottom:18px">Schedule</h1>
    <p class="sec-lbl">Daily breakdown</p>
    <div class="card" style="padding:0 1.25rem">
      ${[1,2,3,4,5,6,0].map(d=>{
        const isT=d===dow,isSched=isScheduledDay(d,wk);
        return `<div class="sch-row" style="${!isSched?'opacity:.4':''}">
          <span class="sch-d" style="${isT?'color:var(--accent)':''}">${DAYS[d]}</span>
          <span class="sch-t"></span>
          ${isSched?tbadge(DOW_TYPE[d]):`<span style="font-size:11px;color:var(--text3)">Rest</span>`}
        </div>`;}).join('')}
    </div>
    <p class="sec-lbl">Ramp-up phases</p>
    ${phases.map(p=>`
      <div class="card" style="${p.a?'border:1.5px solid var(--accent);':''};${p.done?'opacity:.45':''}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <p style="font-weight:700;font-size:14px;${p.a?'color:var(--accent)':''}">${p.l}</p>
            <p style="font-size:13px;color:var(--text2);margin-top:3px">${p.s}</p>
          </div>
          ${p.done?`<span style="color:var(--green);font-size:18px;font-weight:700">\u2713</span>`:p.a?`<span style="color:var(--accent);font-size:11px;font-weight:700">CURRENT</span>`:''}
        </div>
      </div>`).join('')}
    <p class="sec-lbl">Progression rules</p>
    <div class="card">
      <p style="font-size:13px;color:var(--text2);line-height:1.8">
        Add a 3rd circuit round when 2 rounds feel consistently manageable at full form.<br><br>
        When exercises feel easy, slow the lowering phase to a 4-count before increasing weight.<br><br>
        Next equipment step: 10 lb dumbbell pair.
      </p>
    </div>
  </div>`;
}

function histV(){
  const hist=new Set(getHist()),now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  const mName=now.toLocaleString('default',{month:'long'});
  const firstDow=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  let cells=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++)cells+='<div></div>';
  for(let day=1;day<=dim;day++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isT=day===now.getDate(),isDone=hist.has(ds);
    let cls='cal-d cur';
    if(isT)cls+=' today';
    if(isDone)cls+=' done';
    cells+=`<div class="${cls}">${day}</div>`;
  }
  return `<div style="padding:20px 16px 0">
    <h1 class="page-h" style="margin-bottom:18px">History</h1>
    <div class="stat-row">
      <div class="stat"><div class="stat-n">${getStreak()}</div><div class="stat-l">Current streak</div></div>
      <div class="stat"><div class="stat-n">${getHist().length}</div><div class="stat-l">Total workouts</div></div>
    </div>
    <div class="card">
      <p style="font-weight:700;font-size:15px;margin-bottom:12px">${mName} ${yr}</p>
      <div class="cal-grid">${cells}</div>
      <p style="font-size:11px;color:var(--text3);margin-top:10px;text-align:center">Orange = completed workout</p>
    </div>
  </div>`;
}

let steps=[],si=0,tSec=0,tRun=false,tInt=null;

function startGuided(type){
  steps=buildSteps(type);si=0;
  if(!getRampStart())saveRampStart(dStr());
  clrTimer();
  document.getElementById('guided').classList.add('on');
  renderStep();
}
function exitGuided(){
  clrTimer();
  document.getElementById('guided').classList.remove('on');
  go(curView);
}
function clrTimer(){
  if(tInt){clearInterval(tInt);tInt=null;}
  tRun=false;tSec=0;
}
function exTotal(){return steps.filter(s=>s.stype==='exercise').length;}
function exDone(){return steps.slice(0,si).filter(s=>s.stype==='exercise').length;}

function renderStep(){
  const step=steps[si];
  const tot=exTotal(),dn=exDone();
  const pct=tot>0?Math.round((dn/tot)*100):0;
  document.getElementById('g-pf').style.width=pct+'%';
  document.getElementById('g-prog-txt').textContent=step.stype==='exercise'?`${dn+1} of ${tot}`:step.stype==='complete'?'Done!':'';
  clrTimer();
  if(step.stype==='exercise')renderEx(step);
  else if(step.stype==='rest')renderRest(step);
  else if(step.stype==='round')renderRound(step);
  else renderComplete();
}

function nxtLbl(){
  const nxt=steps[si+1];
  if(!nxt||nxt.stype==='complete')return 'Finish workout';
  if(nxt.stype==='round')return `Start round ${nxt.round}`;
  return 'Next exercise';
}

function renderEx(s){
  const isTimed=s.tt==='timed';
  if(isTimed)tSec=s.dur;
  document.getElementById('g-body').innerHTML=`
    <p class="ex-sec">${s.sec}</p>
    <h2 class="ex-name">${s.n}</h2>
    <p class="ex-qty">${s.q}</p>
    <p class="ex-desc">${s.d}</p>
    ${isTimed?`
      <div class="t-disp" id="t-disp">${fmt(s.dur)}</div>
      <p class="t-lbl" id="t-lbl">Timer ready</p>
      <div class="t-btns">
        <button class="btn btn-s" id="t-btn" onclick="toggleT(${s.dur})" style="min-width:140px">Start timer</button>
        <button class="btn btn-g" onclick="resetT(${s.dur})">Reset</button>
      </div>`:''}
    <a href="${s.yt}" target="_blank" class="btn btn-g" style="width:100%;margin-top:${isTimed?'10px':'0'}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 00.5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 002.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 002.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
      Watch how-to on YouTube
    </a>`;
  document.getElementById('g-footer').innerHTML=`
    <button class="btn btn-g" style="width:80px" onclick="prevStep()" ${si===0?'disabled':''}>Back</button>
    <button class="btn btn-p" onclick="nextStep()">${nxtLbl()}</button>`;
}

function renderRest(s){
  tSec=s.dur;
  document.getElementById('g-body').innerHTML=`
    <div style="padding:40px 0 20px;text-align:center">
      <p class="rest-lbl">${s.lbl}</p>
      <div class="rest-n" id="rest-n">${fmt(tSec)}</div>
      <p style="font-size:12px;color:var(--text3);margin-top:8px">Auto-counting down</p>
    </div>`;
  document.getElementById('g-footer').innerHTML=`
    <button class="btn btn-g" style="width:80px" onclick="prevStep()">Back</button>
    <button class="btn btn-p" onclick="nextStep()">Skip rest</button>`;
  tInt=setInterval(()=>{
    tSec--;
    const el=document.getElementById('rest-n');
    if(el)el.textContent=fmt(tSec);
    if(tSec<=0){clrTimer();nextStep();}
  },1000);
}

function renderRound(s){
  document.getElementById('g-body').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px">Starting</p>
      <h2 style="font-size:52px;font-weight:800;color:var(--accent)">Round ${s.round}</h2>
      <p style="font-size:14px;color:var(--text2);margin-top:8px">of 2</p>
    </div>`;
  document.getElementById('g-footer').innerHTML=`<button class="btn btn-p" onclick="nextStep()">Let's go</button>`;
}

function renderComplete(){
  markDone();
  const streak=getStreak();
  document.getElementById('g-body').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:72px;margin-bottom:16px">&#128293;</div>
      <h2 style="font-size:30px;font-weight:800;margin-bottom:10px">Workout done!</h2>
      <p style="font-size:16px;color:var(--text2);margin-bottom:28px">You're on a ${streak}-day streak.</p>
      <div class="stat" style="max-width:140px;margin:0 auto">
        <div class="stat-n" style="font-size:36px">${streak}</div>
        <div class="stat-l">Day streak</div>
      </div>
    </div>`;
  document.getElementById('g-footer').innerHTML=`<button class="btn btn-p" onclick="exitGuided()">Back to home</button>`;
  document.getElementById('g-prog-txt').textContent='Done!';
  document.getElementById('g-pf').style.width='100%';
}

function nextStep(){clrTimer();if(si<steps.length-1){si++;renderStep();}}
function prevStep(){
  clrTimer();
  if(si>0){
    si--;
    while(si>0&&(steps[si].stype==='rest'||steps[si].stype==='round'))si--;
    renderStep();
  }
}

function toggleT(dur){
  if(tRun){
    clearInterval(tInt);tInt=null;tRun=false;
    const b=document.getElementById('t-btn'),l=document.getElementById('t-lbl');
    if(b)b.textContent='Resume timer';if(l)l.textContent='Paused';
  } else {
    if(tSec<=0)tSec=dur;
    tRun=true;
    const b=document.getElementById('t-btn'),l=document.getElementById('t-lbl');
    if(b)b.textContent='Pause timer';if(l)l.textContent='Running...';
    tInt=setInterval(()=>{
      tSec--;
      const d=document.getElementById('t-disp');
      if(d)d.textContent=fmt(tSec);
      if(tSec<=0){
        clearInterval(tInt);tInt=null;tRun=false;
        const b=document.getElementById('t-btn'),l=document.getElementById('t-lbl');
        if(b){b.textContent="Time's up!";b.disabled=true;}
        if(l)l.textContent='Timer complete';
      }
    },1000);
  }
}

function resetT(dur){
  clearInterval(tInt);tInt=null;tRun=false;tSec=dur;
  const d=document.getElementById('t-disp'),b=document.getElementById('t-btn'),l=document.getElementById('t-lbl');
  if(d)d.textContent=fmt(dur);
  if(b){b.textContent='Start timer';b.disabled=false;}
  if(l)l.textContent='Timer ready';
}

function fmt(s){s=Math.max(0,s);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

go('home');
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{});
</script>
</body>
</html>
